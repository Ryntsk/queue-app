<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://queue-app-4mvt.onrender.com"></script>
    <style>
        /* Добавим немного стилей, чтобы сетка не выглядела в столбик */
        #queueGrid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 колонок */
            gap: 10px;
            padding: 10px;
        }
        .slot {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
        }
        .occupied {
            background-color: #ff4d4d;
            color: white;
        }
    </style>
</head>
<body>

    <div id="queueGrid"></div>

    <script>
        // ВОТ ЗДЕСЬ ВАШ КОД БУДЕТ ПОДСВЕЧИВАТЬСЯ
        const tg = window.Telegram.WebApp;
        const API_URL = "https://твой-проект.onrender.com"; 

        async function updateGrid() {
            try {
                const response = await fetch(`${API_URL}/get_queue`);
                const data = await response.json();
                
                const grid = document.getElementById('queueGrid');
                grid.innerHTML = ''; 

                for (let i = 1; i <= 30; i++) {
                    const div = document.createElement('div');
                    div.className = 'slot';
                    if (data[i]) {
                        div.classList.add('occupied');
                        div.innerHTML = `<span class="slot-num">${i}</span><br><small>${data[i]}</small>`;
                    } else {
                        div.innerHTML = `<span class="slot-num">${i}</span><br><small>Свободно</small>`;
                        div.onclick = () => {
                            // Отправляем данные боту при клике на пустой слот
                            tg.sendData(JSON.stringify({slot: i}));
                        };
                    }
                    grid.appendChild(div);
                }
            } catch (e) {
                console.error("Ошибка загрузки очереди:", e);
            }
        }

        setInterval(updateGrid, 3000);
        updateGrid();
        
        // Сообщаем Telegram, что приложение готово
        tg.ready();
    </script>
</body>
</html>
